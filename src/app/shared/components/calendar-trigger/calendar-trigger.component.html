@if (theme === 'ops') {
  <!-- ops 深色頁面樣式 -->
  <button #triggerBtn
    class="ops-cal-trigger"
    type="button"
    [disabled]="disabled"
    [class.is-disabled]="disabled"
    (click)="openCalendar()">
    <svg class="ops-cal-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" />
    </svg>
    <span class="ops-cal-val">{{ displayValue || (selectedDate | date: 'yyyy/MM/dd') || (placeholder || title) }} &nbsp; {{ selectedTimeLabel }}</span>
  </button>
} @else {
  <!-- 原本樣式(預設) -->
  <button #triggerBtn
    class="flex items-center justify-between gap-1 w-full h-full p-1 text-base leading-none text-left text-[#b1b5b4] bg-[#b1b5b4] rounded-sm cursor-pointer"
    type="button"
    [disabled]="disabled"
    [ngClass]="disabled ? '!bg-[#E5E5E5] !text-gray-400 !cursor-not-allowed' : ''"
    (click)="openCalendar()">
    <span class="text-white whitespace-nowrap">{{title}}</span>
    <span class="flex-1 min-w-0 text-center bg-white py-2 rounded-sm">{{ (selectedDate | date: 'yyyy/MM/dd') || placeholder }} &nbsp; {{ selectedTimeLabel }}</span>
    <img src="icons/calendar.png" alt="calendar" class="w-4 h-4 lg:w-6 lg:h-6" />
  </button>
}
